services:
  app:
    build: .
    container_name: ipmanager_app
    ports:
      - "8080:80"
    environment:
      - DB_HOST=db
      - DB_NAME=ipmanage
      - DB_USER=root
      - DB_PASS=rootpassword
      - DISCOVERY_AGGRESSIVE_MODE=1
      - ENABLE_NMAP_FALLBACK=1
      - OFFLINE_TTL_MINUTES=30
    depends_on:
      db:
        condition: service_healthy
    networks:
      - ipmanage_net

  db:
    image: mariadb:10.11
    container_name: ipmanager_db
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=ipmanage
    volumes:
      - db_data:/var/lib/mysql
      - ./sql/database.sql:/docker-entrypoint-initdb.d/database.sql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ipmanage_net

networks:
  ipmanage_net:
    driver: bridge

volumes:
  db_data:
